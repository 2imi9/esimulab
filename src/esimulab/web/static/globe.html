<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esimulab — Select Region</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }

    #toolbar {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.85); padding: 12px 24px; border-radius: 12px;
      display: flex; gap: 16px; align-items: center; backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); z-index: 100;
    }
    #toolbar h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
    #toolbar .divider { width: 1px; height: 24px; background: rgba(255,255,255,0.2); }

    .btn {
      padding: 8px 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: #2563eb; color: white; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #374151; border-color: #374151; cursor: not-allowed; opacity: 0.6; }
    .btn-danger { background: transparent; color: #f87171; border-color: #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,0.15); }
    .btn-ghost { background: transparent; color: #93c5fd; border-color: rgba(147,197,253,0.3); }
    .btn-ghost:hover { background: rgba(147,197,253,0.1); }

    #instructions {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.85); padding: 14px 28px; border-radius: 10px;
      backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
      text-align: center; font-size: 14px; z-index: 100;
    }
    #instructions .step { color: #93c5fd; font-weight: 600; }
    #instructions .hint { color: #9ca3af; font-size: 12px; margin-top: 4px; }

    #region-info {
      position: absolute; top: 80px; right: 16px;
      background: rgba(10, 10, 26, 0.9); padding: 16px; border-radius: 10px;
      backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
      font-family: monospace; font-size: 12px; z-index: 100; display: none;
      min-width: 220px;
    }
    #region-info .label { color: #9ca3af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    #region-info .value { color: #93c5fd; margin-bottom: 8px; }

    #loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 26, 0.9); z-index: 200; display: none;
      justify-content: center; align-items: center; flex-direction: column; gap: 16px;
    }
    #loading-overlay.active { display: flex; }
    .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="toolbar">
    <h1>Esimulab</h1>
    <div class="divider"></div>
    <button class="btn btn-ghost" id="btn-draw" onclick="startDrawing()">Draw Region</button>
    <button class="btn btn-danger" id="btn-clear" onclick="clearSelection()" style="display:none">Clear</button>
    <button class="btn btn-primary" id="btn-confirm" onclick="confirmSelection()" disabled>Explore Region</button>
  </div>

  <div id="instructions">
    <div class="step">Click "Draw Region" then click two corners on the globe to select an area</div>
    <div class="hint">Use scroll to zoom, drag to rotate</div>
  </div>

  <div id="region-info">
    <div class="label">Selected Region</div>
    <div class="value" id="info-north">North: —</div>
    <div class="value" id="info-south">South: —</div>
    <div class="value" id="info-east">East: —</div>
    <div class="value" id="info-west">West: —</div>
    <div class="label" style="margin-top:8px">Approx. Size</div>
    <div class="value" id="info-size">— x — km</div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div>Fetching terrain data...</div>
    <div id="loading-status" style="font-size:12px;color:#9ca3af"></div>
  </div>

  <script type="module" src="js/globe.js"></script>
</body>
</html>
