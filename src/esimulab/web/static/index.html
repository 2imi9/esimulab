<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esimulab Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }
    #controls {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 8px;
      display: flex; gap: 16px; align-items: center; backdrop-filter: blur(8px);
    }
    button {
      background: #16213e; color: #e0e0e0; border: 1px solid #0f3460;
      padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #0f3460; }
    button.active { background: #e94560; border-color: #e94560; }
    input[type="range"] { width: 120px; }
    label { font-size: 13px; }
    #info {
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 4px;
      font-size: 12px; font-family: monospace;
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="loading">Loading Esimulab Viewer...</div>
    <div id="info">
      <span id="fps-counter">FPS: --</span> |
      <span id="frame-counter">Frame: 0/0</span> |
      <span id="particle-count">Particles: 0</span>
    </div>
    <div id="controls">
      <button id="btn-play" class="active">Play</button>
      <button id="btn-pause">Pause</button>
      <label>Speed: <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1"></label>
      <label>Frame: <input type="range" id="frame-slider" min="0" max="100" step="1" value="0"></label>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
